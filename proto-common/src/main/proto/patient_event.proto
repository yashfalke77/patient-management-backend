syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.pm.proto";
option java_outer_classname = "PatientEventProto";

message PatientEvent {
  string id=1;
  string email=2;
  string firstName=3;
  string lastName=4;
  string dateOfBirth=5;
  string event_type = 6;
  string userId = 7;
}